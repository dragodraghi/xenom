[build]
  publish = "."

[[redirects]]
  from = "/video"
  to = "/video.html"
  status = 200

[[redirects]]
  from = "/iscriviti"
  to = "/iscriviti.html"
  status = 200

[[redirects]]
  from = "/live"
  to = "/live.html"
  status = 200

[[redirects]]
  from = "/presentazione"
  to = "/presentazione.html"
  status = 200

[[redirects]]
  from = "/giudici"
  to = "/giudici.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/giudici.html"
  status = 200

[[redirects]]
  from = "/admin.html"
  to = "/giudici.html"
  status = 301

[[redirects]]
  from = "/podio"
  to = "/podio.html"
  status = 200

[[redirects]]
  from = "/health"
  to = "/health.html"
  status = 200

[[redirects]]
  from = "/tusk"
  to = "/invito.html"
  status = 200

# === Hide sensitive files from public access ===
# Block direct serving of source-control / dev artifacts. Status 404 makes
# Netlify return its default not-found page (the `to` is required by schema
# but ignored for 404 redirects).

[[redirects]]
  from = "/firestore.rules"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/firestore.indexes.json"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/firebase.json"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/tests/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/setup.html"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/docs/superpowers/*"
  to = "/"
  status = 404
  force = true

[[redirects]]
  from = "/.codex-deploy/*"
  to = "/"
  status = 404
  force = true
