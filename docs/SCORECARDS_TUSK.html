<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>TUSK Protocol - Score Cards WOD</title>
  <style>
    @page { size: A4 portrait; margin: 9mm; }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      color: #111;
      background: #f0f0ec;
      font: 9.6pt/1.25 "Arial Narrow", Arial, sans-serif;
    }

    .controls {
      max-width: 210mm;
      margin: 18px auto;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .controls button {
      border: 0;
      background: #111;
      color: #fff;
      padding: 10px 18px;
      font-weight: 800;
      cursor: pointer;
      border-radius: 4px;
    }

    .sheet {
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto 16px;
      padding: 9mm;
      background: #fff;
      box-shadow: 0 10px 28px rgba(0,0,0,0.16);
      page-break-after: always;
      display: flex;
      flex-direction: column;
      gap: 3.2mm;
    }

    .sheet:last-child { page-break-after: auto; }

    .topbar {
      display: grid;
      grid-template-columns: 17mm 1fr 31mm;
      gap: 4mm;
      align-items: center;
      border-bottom: 2px solid #111;
      padding-bottom: 3mm;
    }

    .logo {
      width: 16mm;
      height: 16mm;
      object-fit: contain;
      border: 1.5px solid #111;
      padding: 1.5mm;
    }

    .brand {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 900;
      font-size: 8pt;
    }

    h1 {
      margin: 0.8mm 0 0;
      font-size: 22pt;
      line-height: 0.9;
      text-transform: uppercase;
      letter-spacing: -0.01em;
    }

    .event-number {
      border: 2px solid #111;
      text-align: center;
      padding: 2mm;
      text-transform: uppercase;
      font-weight: 900;
    }

    .event-number b {
      display: block;
      font-size: 24pt;
      line-height: 0.95;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: 1.5fr 0.9fr 0.7fr 0.7fr;
      gap: 2mm;
    }

    .field {
      border: 1px solid #111;
      min-height: 12mm;
      padding: 1.4mm 2mm;
    }

    .field label,
    .block-title {
      display: block;
      text-transform: uppercase;
      font-weight: 900;
      font-size: 7pt;
      letter-spacing: 0.08em;
      color: #444;
      margin-bottom: 1.5mm;
    }

    .line {
      height: 5.4mm;
      border-bottom: 1px solid #111;
    }

    .summary {
      display: grid;
      grid-template-columns: 1.1fr 1fr;
      gap: 2mm;
    }

    .box {
      border: 1px solid #111;
      padding: 2mm;
    }

    .box--dark {
      background: #111;
      color: #fff;
    }

    .box p,
    .box ul,
    .box ol {
      margin: 0;
    }

    .box ul,
    .box ol {
      padding-left: 4.5mm;
    }

    .box li {
      margin: 0.6mm 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    th,
    td {
      border: 1px solid #111;
      padding: 1.5mm;
      vertical-align: top;
    }

    th {
      background: #111;
      color: #fff;
      text-transform: uppercase;
      font-size: 7pt;
      letter-spacing: 0.06em;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2mm;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2mm;
    }

    .score-cell {
      border: 2px solid #111;
      min-height: 15mm;
      padding: 1.6mm;
    }

    .score-cell strong {
      display: block;
      text-transform: uppercase;
      font-size: 7pt;
      letter-spacing: 0.06em;
      margin-bottom: 2mm;
    }

    .score-line {
      height: 7mm;
      border-bottom: 1.4px solid #111;
    }

    .rep-table td {
      height: 8mm;
    }

    .footer {
      margin-top: auto;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2mm;
    }

    .sign {
      border: 1px solid #111;
      min-height: 18mm;
      padding: 1.5mm;
    }

    .small {
      font-size: 8pt;
      color: #333;
    }

    .note-area {
      min-height: 15mm;
      border: 1px solid #111;
      padding: 1.5mm;
    }

    .page-tag {
      text-align: right;
      color: #555;
      font-size: 7.5pt;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    @media print {
      html,
      body { background: #fff; }
      .controls { display: none !important; }
      .sheet {
        width: auto;
        min-height: 279mm;
        margin: 0;
        padding: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="window.print()">Stampa / salva PDF</button>
    <span>10 pagine A4: una scorecard operativa per ogni WOD.</span>
  </div>

  <main id="cards"></main>

  <script>
    const CATEGORIES = ["Ultimate M", "Advanced M", "Challenge M", "Essential M", "Performance F", "Intermediate F"];

    const EVENTS = [
      {
        n: 1,
        name: "Snatch 1RM",
        day: "Day 1",
        format: "Cap 10' - 4 attempts, 1:30 work + 1:00 loading/rest, any snatch style.",
        score: "Best valid lift in kg. Higher is better.",
        tie: "No official tie-break unless organizer decides otherwise.",
        result: ["Best lift kg", "Attempt #", "No rep count", "Final score kg"],
        variants: [
          ["All categories", "Max valid snatch kg"]
        ],
        standards: [
          "Judge confirms each attempt as good lift or no rep before recording.",
          "Record all attempts; only the best valid lift is final score.",
          "If athlete misses all attempts, score 0 kg and write notes."
        ],
        tracker: ["Attempt 1 kg", "Good/No rep", "Attempt 2 kg", "Good/No rep", "Attempt 3 kg", "Good/No rep", "Attempt 4 kg", "Good/No rep"]
      },
      {
        n: 2,
        name: "Ascending Ladder",
        day: "Day 1",
        format: "AMRAP 8' - ascending ladder.",
        score: "Total reps completed. Higher is better.",
        tie: "RX: time after last Rope Climb. Scaled: time after Burpees Over Line.",
        result: ["Total reps", "Tie-break time", "No rep count", "Final score reps"],
        variants: [
          ["Ultimate / Advanced / Challenge M", "2 Wall Walk + 1 Rope Climb, then 4+2, 6+3..."],
          ["Essential M / Performance F / Intermediate F", "2 Scaled Wall Walk + 4 Burpees Over Line, then 4+8, 6+12..."]
        ],
        standards: [
          "One completed Wall Walk, Rope Climb or Burpee Over Line = 1 rep.",
          "Record tie-break immediately when the required checkpoint is completed.",
          "If athlete is between movements at cap, count only completed valid reps."
        ],
        tracker: ["Last full ladder step", "Extra WW / Scaled WW", "Extra RC / BOL", "Tie-break"]
      },
      {
        n: 3,
        name: "Max Cal Assault Bike",
        day: "Day 1",
        format: "60 seconds all-out Assault Bike.",
        score: "Calories on monitor at 60 seconds. Higher is better.",
        tie: "No official tie-break.",
        result: ["Calories", "Bike number", "No rep count", "Final score cal"],
        variants: [
          ["All categories", "Same format: max calories in 60 seconds"]
        ],
        standards: [
          "Reset monitor before athlete starts.",
          "Start and stop on judge clock; record calories shown at 60 seconds.",
          "Do not round manually: write the monitor value."
        ],
        tracker: ["Monitor reset", "Start time", "Stop time", "Calories"]
      },
      {
        n: 4,
        name: "Barbell Sprint",
        day: "Day 1",
        format: "AMRAP 5' - 12 Deadlift + 9 Front Squat + 6 Shoulder-to-Overhead + 3 Thrusters. 30 reps/round.",
        score: "Rounds x 30 + extra reps. Higher is better.",
        tie: "Tie-break after Thrusters / full round.",
        result: ["Rounds", "Extra reps", "Tie-break", "Total reps"],
        variants: [
          ["Ultimate / Advanced / Challenge / Essential M", "70 / 60 / 50 / 40 kg"],
          ["Performance / Intermediate F", "45 / 30 kg"]
        ],
        standards: [
          "Count every valid rep in order; athlete cannot skip movements.",
          "Record extra reps inside current round at cap.",
          "Tie-break is the time at end of last completed round."
        ],
        tracker: ["Round 1", "Round 2", "Round 3", "Round 4", "Extra DL", "Extra FS", "Extra S2OH", "Extra Thrusters"]
      },
      {
        n: 5,
        name: "Engine Test",
        day: "Day 2",
        format: "For Time, cap 15'. RX: 1000m row + 2000m run. Essential M: 750m row + 1500m run.",
        score: "Finish time mm:ss. If DNF: record meters/work units completed at cap.",
        tie: "Tie-break after row.",
        result: ["Finish mm:ss", "DNF meters", "Row split / TB", "Final score"],
        variants: [
          ["Ultimate / Advanced / Challenge M", "1000m row + 2000m run - full work 3000m"],
          ["Essential M", "750m row + 1500m run - full work 2250m"],
          ["Performance / Intermediate F", "1000m row + 2000m run - full work 3000m"]
        ],
        standards: [
          "If athlete finishes before cap, write finish time only.",
          "If athlete does not finish, check DNF and write total meters completed at 15:00.",
          "Do not write a finish time over 15:00."
        ],
        tracker: ["Row meters", "Row split", "Run meters", "Finish / cap", "DNF?", "Meters at cap"]
      },
      {
        n: 6,
        name: "Ground Zero",
        day: "Day 2",
        format: "For Time, cap 10'. Chipper: 9 SOB / 15 BJO / 12 G2S / carry / 15 G2S / carry / 12 G2S / 15 BJO / 9 SOB.",
        score: "Finish time mm:ss. If DNF: record movement reps completed at cap. Full work = 87 scored reps.",
        tie: "Tie-break after first Sandbag G2S block.",
        result: ["Finish mm:ss", "DNF reps", "Tie-break", "Final score"],
        variants: [
          ["Ultimate / Advanced M", "Sandbag 70 kg, box 24 in"],
          ["Challenge / Essential M", "Sandbag 50 kg, box 20 in"],
          ["Performance F", "Sandbag 50 kg, box 24 in"],
          ["Intermediate F", "Sandbag 30 kg, box 24 in"]
        ],
        standards: [
          "Carry sections must be completed for flow; DNF score counts the 87 movement reps.",
          "If athlete does not finish, check DNF and write reps completed at 10:00.",
          "Do not write a finish time over 10:00."
        ],
        tracker: ["9 SOB", "15 BJO", "12 G2S", "Carry", "15 G2S", "Carry", "12 G2S", "15 BJO", "9 SOB"]
      },
      {
        n: 7,
        name: "Barbell Version",
        day: "Day 2",
        format: "Cap 7'. Complete 3 rounds with 15 / 15 / 10 reps, then max reps final gymnastics skill.",
        score: "Only final skill reps count. Higher is better.",
        tie: "Official tie-break: end of round 3.",
        result: ["Final skill reps", "Round 3 TB", "No rep count", "Final score reps"],
        variants: [
          ["Ultimate", "T2B + BMU @50 kg, final RMU"],
          ["Advanced", "T2B + BMU @45 kg, final RMU"],
          ["Challenge", "CTB @40 kg, final BMU"],
          ["Essential", "Pull-up @35 kg, final CTB"],
          ["Performance F", "CTB @37.5 kg, final BMU"],
          ["Intermediate F", "Pull-up @25 kg, final CTB"]
        ],
        standards: [
          "Athlete must complete the 3-round buy-in before final skill reps count.",
          "If buy-in is not completed, final skill reps = 0; record progress in notes.",
          "Record round 3 tie-break immediately."
        ],
        tracker: ["Round 1 complete", "Round 2 complete", "Round 3 complete", "TB time", "Final skill reps", "No reps"]
      },
      {
        n: 8,
        name: "Engine Chaos",
        day: "Day 2",
        format: "AMRAP 12'. Block 1: BOL + Ski + Bike. Block 2: BOL + Bike + Ski. Then max burpees.",
        score: "Total reps completed. Higher is better.",
        tie: "Tie-break after ergometers.",
        result: ["Total reps", "Tie-break", "No rep count", "Final score reps"],
        variants: [
          ["Male categories", "30 BOL + 30 cal Ski + 30 cal Bike, then 30 BOL + 30 cal Bike + 30 cal Ski"],
          ["Female categories", "30 BOL + 24 cal Ski + 24 cal Bike, then 30 BOL + 24 cal Bike + 24 cal Ski"]
        ],
        standards: [
          "Calories count as reps for scoring.",
          "After both ergometer blocks, count every valid burpee in remaining time.",
          "Record tie-break when the second ergometer block is completed."
        ],
        tracker: ["BOL 1", "Ski 1", "Bike 1", "BOL 2", "Bike 2", "Ski 2", "Burpees", "TB time"]
      },
      {
        n: 9,
        name: "Heavy Clean Ladder",
        day: "Day 2",
        format: "AMRAP 8'. Cleans ladder 10 / 8 / 6 / 4 / 2, then AMRAP at top weight.",
        score: "Total cleans completed. Higher is better.",
        tie: "Last clean step completed entirely.",
        result: ["Total cleans", "Top-weight reps", "Tie-break step", "Final score reps"],
        variants: [
          ["Ultimate M", "60 / 70 / 80 / 90 / 100 / 110 kg"],
          ["Advanced M", "50 / 60 / 70 / 80 / 90 / 100 kg"],
          ["Challenge M", "40 / 50 / 60 / 70 / 80 / 90 kg"],
          ["Essential M", "20 / 30 / 40 / 50 / 60 / 70 kg"],
          ["Performance F", "35 / 40 / 45 / 50 / 55 / 60 kg"],
          ["Intermediate F", "20 / 25 / 30 / 35 / 40 / 45 kg"]
        ],
        standards: [
          "Any clean allowed: power, squat or split.",
          "Athlete must complete all reps at a step before moving to the next weight.",
          "Score example: 10+8+6+4+2+7 = 37."
        ],
        tracker: ["10 cleans", "8 cleans", "6 cleans", "4 cleans", "2 cleans", "AMRAP top", "Total", "TB step"]
      },
      {
        n: 10,
        name: "The Finale",
        day: "Day 2",
        format: "AMRAP 12'. 6 HSPU + 8 C2B/Pull-up + 12 Front Rack Barbell Lunges. 26 reps/round.",
        score: "Rounds x 26 + extra reps. Higher is better.",
        tie: "Tie-break at end of full round.",
        result: ["Rounds", "Extra reps", "Tie-break", "Total reps"],
        variants: [
          ["Ultimate M", "HSPU standard + C2B + 60 kg"],
          ["Advanced M", "HSPU standard + C2B + 50 kg"],
          ["Challenge M", "HSPU + 1 AbMat + C2B + 40 kg"],
          ["Essential M", "Push-up + Pull-up + 35 kg"],
          ["Performance F", "HSPU + 1 AbMat + C2B + 40 kg"],
          ["Intermediate F", "Push-up + Pull-up + 25 kg"]
        ],
        standards: [
          "Lunges: alternating, in place, barbell from floor, front rack required.",
          "Knee touches floor; no split recovery.",
          "Only top 5/6 per category run this event, as decided by organizer."
        ],
        tracker: ["Round 1", "Round 2", "Round 3", "Round 4", "Extra HSPU/PU", "Extra pull", "Extra lunges", "TB time"]
      }
    ];

    function rows(items, cols = 2) {
      const perRow = Math.ceil(items.length / cols);
      return Array.from({ length: perRow }, (_, i) => {
        const cells = Array.from({ length: cols }, (_, c) => items[i + (c * perRow)] || "");
        return `<tr>${cells.map((x) => `<td>${x}</td>`).join("")}</tr>`;
      }).join("");
    }

    function variantsTable(event) {
      return `
        <table>
          <thead><tr><th style="width:35%">Categoria</th><th>Versione / carico</th></tr></thead>
          <tbody>${event.variants.map((v) => `<tr><td>${v[0]}</td><td>${v[1]}</td></tr>`).join("")}</tbody>
        </table>
      `;
    }

    function trackerTable(event) {
      return `
        <table class="rep-table">
          <thead><tr><th colspan="4">Progress tracker / rep count</th></tr></thead>
          <tbody>${rows(event.tracker.map((x) => `<strong>${x}</strong><div class="line"></div>`), 4)}</tbody>
        </table>
      `;
    }

    function resultBoxes(event) {
      return `
        <div class="score-grid">
          ${event.result.map((label) => `
            <div class="score-cell">
              <strong>${label}</strong>
              <div class="score-line"></div>
            </div>
          `).join("")}
        </div>
      `;
    }

    function standards(event) {
      return `
        <div class="box">
          <span class="block-title">Judge checklist</span>
          <ol>${event.standards.map((x) => `<li>${x}</li>`).join("")}</ol>
        </div>
      `;
    }

    function sheet(event) {
      return `
        <section class="sheet">
          <header class="topbar">
            <img class="logo" src="../assets/icons/tusk-icon-180.png" alt="TUSK logo">
            <div>
              <div class="brand">TUSK Protocol - Bad Boars Edition - 29/30 Maggio 2026</div>
              <h1>${event.name}</h1>
            </div>
            <div class="event-number">Event <b>${event.n}</b>${event.day}</div>
          </header>

          <div class="meta-grid">
            <div class="field"><label>Atleta</label><div class="line"></div></div>
            <div class="field"><label>Categoria</label><div class="line"></div></div>
            <div class="field"><label>Heat</label><div class="line"></div></div>
            <div class="field"><label>Lane</label><div class="line"></div></div>
          </div>

          <div class="summary">
            <div class="box box--dark">
              <span class="block-title" style="color:#d9d9d9">Format</span>
              <p>${event.format}</p>
            </div>
            <div class="box">
              <span class="block-title">Scoring</span>
              <p><strong>${event.score}</strong></p>
              <p class="small">Tie-break: ${event.tie}</p>
            </div>
          </div>

          ${variantsTable(event)}

          <div class="two-col">
            ${standards(event)}
            <div class="box">
              <span class="block-title">No reps / penalties</span>
              <p class="small">Segna ogni no rep appena succede; non correggere a memoria a fine heat.</p>
              <div class="note-area" style="margin-top:2mm"></div>
            </div>
          </div>

          ${trackerTable(event)}
          ${resultBoxes(event)}

          <div class="two-col">
            <div class="box">
              <span class="block-title">Note operative</span>
              <div class="note-area"></div>
            </div>
            <div class="box">
              <span class="block-title">Inserimento admin</span>
              <p class="small">Trascrivi solo il risultato finale in giudici.html. Per DNF usa la checkbox DNF e le reps/work unit al cap.</p>
            </div>
          </div>

          <footer class="footer">
            <div class="sign"><label>Firma giudice</label><div class="line" style="margin-top:6mm"></div></div>
            <div class="sign"><label>Firma atleta</label><div class="line" style="margin-top:6mm"></div></div>
            <div class="sign"><label>Ora consegna</label><div class="line" style="margin-top:6mm"></div></div>
          </footer>
          <div class="page-tag">Scorecard ${event.n}/10 - stampa una copia per atleta/heat</div>
        </section>
      `;
    }

    document.getElementById("cards").innerHTML = EVENTS.map(sheet).join("");
  </script>
</body>
</html>
